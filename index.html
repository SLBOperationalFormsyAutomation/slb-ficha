<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ficha Médica H&P</title>

<style>
:root { --blue:#002855; }

body{
  margin:0;
  font-family:Arial;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,40,85,.8),rgba(0,40,85,.9)),
  url("Fondo.png");
  background-size:cover;
  filter:blur(3px);
  z-index:-1;
}

form{
  background:white;
  max-width:520px;
  margin:20px auto;
  padding:25px;
  border-radius:12px;
}

h2{ text-align:center; color:var(--blue); }

label{ margin-top:10px; display:block; font-weight:bold;}

input, select, textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:var(--blue);
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<form id="form">

<h2>Ficha Médica H&P</h2>

<label>Nombre*</label>
<input id="nombre" required>

<label>Documento*</label>
<input id="documento" required>

<label>Fecha nacimiento*</label>
<input type="date" id="fecha_nacimiento" required>

<label>Empresa*</label>
<input id="empresa" required>

<label>Cargo*</label>
<input id="cargo" required>

<label>Locación*</label>
<select id="locacion">
<option>Oficinas Bogotá</option>
<option>Base Yopal Casanare</option>
<option>Rig 133</option>
<option>Rig 900</option>
<option>Rig T618</option>
<option>Otro</option>
</select>

<label>Fecha ingreso</label>
<input type="date" id="fecha_ingreso">

<label>Teléfono*</label>
<input id="telefono" required>

<label>Email*</label>
<input id="email" required>

<label>EPS*</label>
<input id="eps" required>

<label>ARL*</label>
<input id="arl" required>

<hr>

<label>Enfermedad actual</label>
<textarea id="enfermedad_actual"></textarea>

<label>Diagnóstico*</label>
<select id="diagnostico">
<option>Hipertensión arterial</option>
<option>Diabetes</option>
<option>Epilepsia</option>
<option>Dislipidemia</option>
<option>Ninguna</option>
<option>Otra</option>
</select>

<label>Otra enfermedad</label>
<textarea id="otra_enfermedad"></textarea>

<label>Cirugías</label>
<textarea id="cirugias"></textarea>

<label>Traumas</label>
<textarea id="traumas"></textarea>

<label>Medicamentos</label>
<textarea id="medicamentos"></textarea>

<label>Tipo sangre</label>
<input id="tipo_sangre">

<label>Alergias</label>
<textarea id="alergias"></textarea>

<label>Condiciones médicas</label>
<textarea id="condiciones"></textarea>

<label>Contacto emergencia*</label>
<textarea id="contacto_emergencia" required></textarea>

<button type="submit">Enviar</button>

</form>

<script>
const API_URL="https://slb-alturas.onrender.com";

document.getElementById("form").addEventListener("submit", async e=>{
  e.preventDefault();

  const data={
    nombre:nombre.value,
    documento:documento.value,
    fecha_nacimiento:fecha_nacimiento.value,
    empresa:empresa.value,
    cargo:cargo.value,
    locacion:locacion.value,
    fecha_ingreso:fecha_ingreso.value,
    telefono:telefono.value,
    email:email.value,
    eps:eps.value,
    arl:arl.value,

    enfermedad_actual:enfermedad_actual.value,
    diagnostico:diagnostico.value,
    otra_enfermedad:otra_enfermedad.value,
    cirugias:cirugias.value,
    traumas:traumas.value,
    medicamentos:medicamentos.value,
    tipo_sangre:tipo_sangre.value,
    alergias:alergias.value,
    condiciones:condiciones.value,
    contacto_emergencia:contacto_emergencia.value
  };

  const res = await fetch(`${API_URL}/registro_ficha`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  if(res.ok){
    alert("Enviado correctamente ✅");
    location.reload();
  }else{
    alert("Error al enviar ❌");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔹 LOGO EN PESTAÑA -->
<link rel="icon" type="image/png" href="logo.png">


<title>Login Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#001f3f,#007BFF);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0px 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

.icon{
  font-size:50px;
  color:#007BFF;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#007BFF;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.back{
  margin-top:10px;
  background:#555;
}
</style>
</head>

<body>

<div class="card">

  <div class="icon">👤</div>

  <h2>Acceso Administrador</h2>

  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <button class="back" onclick="volver()">Volver al formulario</button>

</div>

<script>

const API_URL = "https://slb-alturas.onrender.com";

function login(){
    fetch(`${API_URL}/login_check`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      user: user.value,
      pass: pass.value
    })
  })
  .then(r=>{
    if(r.ok){
      window.location.href = "https://slboperationalformsyautomation.github.io/slb-ficha/dashboard.html";
    }else{
      alert("Credenciales incorrectas ❌");
    }
  });
}

function volver(){
  window.location.href = "https://slboperationalformsyautomation.github.io/slb-ficha/";
}

</script>

</body>
</html>

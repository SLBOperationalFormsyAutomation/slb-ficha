<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- 🔹 LOGO EN PESTAÑA -->
<link rel="icon" type="image/png" href="logo.png">

<title>Dashboard Ficha Médica</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#002855;
  color:white;
  text-align:center;
}

.card{
  background:white;
  color:black;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00aaff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Dashboard Ficha Médica</h1>

<div class="card">
  <h3>Total Registros</h3>
  <h2 id="total"></h2>
</div>

<div class="card">
  <button onclick="descargarExcel()">📥 Descargar Excel</button>
</div>

<script>

let registros = []

fetch("/data_ficha")
.then(r=>r.json())
.then(data=>{
    registros = data
    document.getElementById("total").innerText = data.length
})

function descargarExcel(){

    if(!registros || registros.length === 0){
        alert("No hay datos para descargar ❌");
        return;
    }

    let csv = "";

    const headers = Object.keys(registros[0]);
    csv += headers.join(",") + "\n";

    registros.forEach(r=>{
        let row = headers.map(h => `"${(r[h] || "").toString().replace(/"/g,'""')}"`);
        csv += row.join(",") + "\n";
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "ficha_medica.csv";
    a.click();
}

</script>

</body>
</html>

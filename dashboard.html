<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- 🔹 LOGO EN PESTAÑA -->
<link rel="icon" type="image/png" href="logo.png">

<title>Dashboard Ficha Médica</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="position:fixed; top:10px; right:10px;">
  <button onclick="logout()" style="
    background:#ff4d4d;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
  ">
    Cerrar sesión
  </button>
</div>

<style>
body{
  font-family:Arial;
  background:#002855;
  color:white;
  text-align:center;
}

.card{
  background:white;
  color:black;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00aaff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Dashboard Ficha Médica</h1>

<div class="card">
  <h3>Total Registros</h3>
  <h2 id="total"></h2>
</div>

<div class="card">
  <button onclick="descargarExcel()">📥 Descargar Excel</button>
</div>

<script>

let registros = []

const API_URL = "https://slb-alturas.onrender.com";

fetch(`${API_URL}/data_ficha`)
.then(r => r.json())
.then(data=>{
    registros = data;
    document.getElementById("total").innerText = data.length;
})
.catch(err=>{
    console.log("Error cargando datos:", err);
});

function logout(){
    window.location.href = "https://slboperationalformsyautomation.github.io/slb-ficha/";
}

function descargarExcel(){

    if(!registros || registros.length === 0){
        alert("No hay datos para descargar ❌");
        return;
    }

    // 🔹 ORDEN EXACTO (igual que Supabase)
    const headers = [
        "nombre",
        "documento",
        "fecha_nacimiento",
        "empresa",
        "cargo",
        "locacion",
        "fecha_ingreso",
        "telefono",
        "correo",
        "eps",
        "arl",
        "enfermedad_actual",
        "enfermedades",
        "otra_enfermedad",
        "cirugias",
        "traumas",
        "medicamentos",
        "sangre",
        "alergias",
        "condicion",
        "emergencia",
        "fecha_registro"
    ];

    // 🔹 NOMBRES BONITOS
    const headersBonitos = [
        "ID",
        "Nombre",
        "Documento de Identidad",
        "Fecha Nacimiento",
        "Empresa",
        "Cargo",
        "Locacion",
        "Fecha de Ingreso",
        "Telefono",
        "Correo",
        "EPS",
        "ARL",
        "Antecedentes Medicos",
        "Enfermedad Actual",
        "Otra Enfermedad",
        "Cirugias",
        "Traumas",
        "Medicamentos",
        "Tipo de Sangre",
        "Alergias",
        "Condicion Medica",
        "Contacto de Emergencia",
        "Fecha de Registro"
    ];

    let html = `
    <table border="1">
        <tr style="background-color:#002855;color:white;font-weight:bold;">
            ${headersBonitos.map(h => `<th>${h}</th>`).join("")}
        </tr>
    `;

    registros.forEach((r, index)=>{
        html += "<tr>";

        // 🔥 ID automático
        html += `<td>${index + 1}</td>`;

        headers.forEach(h=>{
            html += `<td>${(r[h] || "").toString()}</td>`;
        });

        html += "</tr>";
    });
    
    html += "</table>";

    const BOM = '\uFEFF';
    const blob = new Blob([BOM + html], { 
    type: "application/vnd.ms-excel;charset=utf-8;" 
    });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "ficha_medica.xls";
    a.click();
}

</script>

</body>
</html>
